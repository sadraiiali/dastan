name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build valac gcc \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev curl \
            libpangocairo-1.0-0 libxml2-dev flex bison \
            gettext appstream desktop-file-utils xvfb

      - name: Compile
        run: |
          make init-build
          meson setup build --prefix=/usr
          meson compile -C build

      - name: Test
        run: xvfb-run -a meson test -C build --print-errorlogs

  package:
    name: Package
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build valac gcc \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev curl \
            file desktop-file-utils librsvg2-bin imagemagick \
            gir1.2-gtk-4.0 gir1.2-adw-1 \
            libgdk-pixbuf2.0-dev libgirepository-2.0-dev \
            libpangocairo-1.0-0 libxml2-dev flex bison \
            gettext appstream xvfb

      - name: Build distribution packages
        run: make dist

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: dastan-packages-${{ github.sha }}
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.zst
            dist/*.AppImage
            dist/*.tar.gz
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.zst
            dist/*.AppImage
            dist/*.tar.gz
          generate_release_notes: true
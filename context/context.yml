categories:
  - name: "Markdown Parser (Full Features + GFM)"
    slug: "markdown-parsers"
    description: "Must support all Markdown features, tables, task lists, footnotes, etc."
    options:
      - name: "markdown-it + plugins"
        description: "Best for Vanilla JS"
        github: "https://github.com/markdown-it/markdown-it"
        license: "MIT"
      - name: "marked"
        description: "Fast and simple"
        github: "https://github.com/markedjs/marked"
        license: "MIT"
      - name: "remark + rehype"
        description: "Most powerful ecosystem (for React)"
        github: "https://github.com/remarkjs/remark"
        license: "MIT"
      - name: "react-markdown"
        description: "Excellent React wrapper for remark"
        github: "https://github.com/remarkjs/react-markdown"
        license: "MIT"
      - name: "MD4C"
        description: "Fast C Markdown parser with built-in LaTeX math spans support"
        github: "https://github.com/mity/md4c"
        license: "MIT"
      - name: "cmark"
        description: "Official CommonMark parser in C (widely used)"
        github: "https://github.com/commonmark/cmark"
        license: "MIT"

  - name: "Math Formula Rendering (LaTeX)"
    slug: "math-rendering"
    description: "Support for $inline$ and $$block$$"
    options:
      - name: "KaTeX"
        description: "Very fast and lightweight (Recommended)"
        github: "https://github.com/KaTeX/KaTeX"
        license: "MIT"
      - name: "MathJax"
        description: "More complete but heavier"
        github: "https://github.com/mathjax/MathJax"
        license: "Apache-2.0"

  - name: "Syntax Highlighting"
    slug: "syntax-highlighting"
    description: "For code blocks"
    options:
      - name: "Shiki"
        description: "Best in 2026 - VS Code like colors (Recommended)"
        github: "https://github.com/shikijs/shiki"
        license: "MIT"
      - name: "Prism.js"
        description: "Lightweight and popular"
        github: "https://github.com/PrismJS/prism"
        license: "MIT"
      - name: "highlight.js"
        description: "Classic option"
        github: "https://github.com/highlightjs/highlight.js"
        license: "BSD-3-Clause"

  - name: "Diagrams & Extras"
    slug: "diagrams"
    description: "Mermaid, etc."
    options:
      - name: "Mermaid"
        description: "Diagrams, Flowcharts, Sequence diagrams, etc. (JavaScript)"
        github: "https://github.com/mermaid-js/mermaid"
        license: "MIT"
      - name: "mmdr (Rust port)"
        description: "Native Rust Mermaid renderer - very fast alternative (no C/C++ native found)"
        github: "https://github.com/search?q=mmdr+mermaid" # Rust native renderer
        license: "MIT (check repo)"

  - name: "Styling (GitHub-like)"
    slug: "styling"
    description: "Make it look beautiful"
    options:
      - name: "github-markdown-css"
        description: "Exact GitHub Markdown style"
        github: "https://github.com/sindresorhus/github-markdown-css"
        license: "MIT"
      - name: "@tailwindcss/typography"
        description: "With Tailwind CSS"
        github: "https://github.com/tailwindlabs/tailwindcss-typography"
        license: "MIT"

  - name: "Security"
    slug: "security"
    description: "Essential for user-generated content"
    options:
      - name: "DOMPurify"
        description: "Sanitization"
        github: "https://github.com/cure53/DOMPurify"
        license: "Apache-2.0 or MPL-2.0"

  - name: "All-in-One / Complete Packages"
    slug: "all-in-one"
    description: "Ready-made solutions that bundle Markdown + Math + Diagrams + Highlighting together"
    options:
      - name: "Glow"
        description: "Beautiful terminal-based Markdown renderer (CLI, not web)"
        github: "https://github.com/charmbracelet/glow"
        license: "MIT"
      - name: "markdown-it (with full plugins)"
        description: "Highly extensible all-in-one base for web"
        github: "https://github.com/markdown-it/markdown-it"
        license: "MIT"
      - name: "react-markdown + ecosystem"
        description: "Full-featured React solution (math, mermaid, shiki)"
        github: "https://github.com/remarkjs/react-markdown"
        license: "MIT"
      - name: "Markdown Prism"
        description: "Native macOS viewer with markdown-it + KaTeX + Mermaid"
        github: "https://github.com/hulryung/markdown-prism"
        license: "Unknown (check repo)"
